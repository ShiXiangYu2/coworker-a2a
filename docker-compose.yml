services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/app/prisma
      - deliverables:/app/deliverables
    environment:
      - DATABASE_URL=file:./dev.db
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/anthropic}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - JWT_SECRET=${JWT_SECRET:-coworker-a2a-secret-key-change-in-production}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER:-}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME:-}
      - COST_BUDGET_DAILY=${COST_BUDGET_DAILY:-10}
      - COST_BUDGET_WEEKLY=${COST_BUDGET_WEEKLY:-50}
      - COST_BUDGET_MONTHLY=${COST_BUDGET_MONTHLY:-200}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/monitoring?view=health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理（HTTPS）
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    restart: unless-stopped

volumes:
  sqlite-data:
  deliverables:
